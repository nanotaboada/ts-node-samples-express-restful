# =============================================================================
# SonarCloud Automatic Analysis configuration
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/automatic-analysis/
#
# SonarCloud's automatic analysis (GitHub App, no CI workflow) reads THIS file.
# Wildcard patterns are NOT supported here, so all exclusion paths must be
# listed explicitly.
# =============================================================================

sonar.projectKey=nanotaboada_ts-node-samples-express-restful
sonar.organization=nanotaboada
sonar.projectName=ts-node-samples-express-restful

sonar.sources=src/
sonar.tests=tests/

# =============================================================================
# Global exclusions
# Swagger configuration and auto-generated docs excluded from analysis.
# =============================================================================

sonar.exclusions=\
  src/docs/swagger-docs.ts,\
  src/docs/swagger.ts

# =============================================================================
# Coverage exclusions
# Mirrors codecov.yml ignore list — focus on src/controllers/, src/routes/,
# src/services/
# =============================================================================

sonar.coverage.exclusions=\
  src/database/player-database-interface.ts,\
  src/database/player-database.ts,\
  src/database/sequelize.ts,\
  src/docs/swagger-docs.ts,\
  src/docs/swagger.ts,\
  src/middlewares/player-validator-interface.ts,\
  src/middlewares/player-validator.ts,\
  src/middlewares/rate-limiter-interface.ts,\
  src/middlewares/rate-limiter.ts,\
  src/middlewares/swagger-middleware.ts,\
  src/models/player-interface.ts,\
  src/models/player-model.ts,\
  tests/health-test.ts,\
  tests/player-stub.ts,\
  tests/player-test.ts,\
  tests/setup.ts,\
  src/app.ts,\
  src/server.ts,\
  src/controllers/health-controller-interface.ts,\
  src/controllers/player-controller-interface.ts,\
  src/routes/health-route-interface.ts,\
  src/routes/player-route-interface.ts,\
  src/services/player-service-interface.ts

# =============================================================================
# Duplicate code (CPD) exclusions
# Automatic analysis does not support wildcard patterns, so each file is
# listed explicitly.
#
# Interface files — structurally similar by design across layers.
# player-stub.ts — test fixture; parallel field assignments by design.
# =============================================================================

sonar.cpd.exclusions=\
  src/controllers/health-controller-interface.ts,\
  src/controllers/player-controller-interface.ts,\
  src/database/player-database-interface.ts,\
  src/middlewares/player-validator-interface.ts,\
  src/middlewares/rate-limiter-interface.ts,\
  src/models/player-interface.ts,\
  src/routes/health-route-interface.ts,\
  src/routes/player-route-interface.ts,\
  src/services/player-service-interface.ts,\
  tests/player-stub.ts
